name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          TAG="${GITHUB_REF_NAME}"
          BINARY="target/${{ matrix.target }}/release/deepsage"
          ARCHIVE="deepsage-${TAG}-${{ matrix.target }}.tar.gz"
          tar -czf "${ARCHIVE}" -C "target/${{ matrix.target }}/release" deepsage
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $TAG = $env:GITHUB_REF_NAME
          $ARCHIVE = "deepsage-$TAG-${{ matrix.target }}.zip"
          Compress-Archive -Path "target\${{ matrix.target }}\release\deepsage.exe" -DestinationPath $ARCHIVE
          echo "ARCHIVE=$ARCHIVE" >> $env:GITHUB_ENV
          $hash = (Get-FileHash $ARCHIVE -Algorithm SHA256).Hash.ToLower()
          "$hash  $ARCHIVE" | Out-File "$ARCHIVE.sha256"

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          generate_release_notes: true
